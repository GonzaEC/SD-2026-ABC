apiVersion: batch/v1
kind: Job
metadata:
  name: setup-dlq
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: setup
          image: setup-dlq:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq