apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumidor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: consumidor
  template:
    metadata:
      labels:
        app: consumidor
    spec:
      containers:
        - name: consumidor
          image: consumidor-ex1:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq
          ports:
            - containerPort: 8000