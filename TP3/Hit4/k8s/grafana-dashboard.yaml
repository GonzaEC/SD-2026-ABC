# Dashboard de Grafana para la plataforma Sobel.
# El label grafana_dashboard: "1" hace que el sidecar de Grafana lo cargue solo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sobel-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sobel-dashboard.json: |
    {
      "uid": "sobel-platform",
      "title": "Sobel — Plataforma Distribuida",
      "tags": ["sobel", "tp3"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU por pod (namespace sobel)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"sobel\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memoria por pod (namespace sobel)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"sobel\",container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "CPU por nodo (%)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "RabbitMQ — mensajes en cola",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "rabbitmq_queue_messages",
              "legendFormat": "{{queue}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Fragmentos: publicados (split) vs consumidos (workers)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(sobel_split_fragments_total[5m]))",
              "legendFormat": "publicados/s"
            },
            {
              "refId": "B",
              "expr": "sum(rate(sobel_worker_fragments_processed_total[5m]))",
              "legendFormat": "consumidos/s"
            }
          ]
        },
        {
          "id": 6,
          "title": "Latencia de procesamiento por fragmento (worker)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum(rate(sobel_worker_processing_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum(rate(sobel_worker_processing_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum(rate(sobel_worker_processing_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 7,
          "title": "Tasa de errores",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(sobel_worker_errors_total[5m]))",
              "legendFormat": "errores worker/s"
            },
            {
              "refId": "B",
              "expr": "sum(rate(sobel_backend_jobs_submitted_total{status=\"error\"}[5m]))",
              "legendFormat": "errores backend/s"
            }
          ]
        },
        {
          "id": 8,
          "title": "Fragmentos procesados por worker (total)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(sobel_worker_fragments_processed_total{status=\"success\"}) by (worker_id)",
              "legendFormat": "{{worker_id}}"
            }
          ]
        }
      ]
    }
