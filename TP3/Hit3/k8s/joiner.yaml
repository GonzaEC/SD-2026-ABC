apiVersion: apps/v1
kind: Deployment
metadata:
  name: joiner
  namespace: sobel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joiner
  template:
    metadata:
      labels:
        app: joiner
    spec:
      nodeSelector:
        nodegroup: apps
      tolerations:
        - key: nodegroup
          value: apps
          effect: NoSchedule
      containers:
        - name: joiner
          image: gcr.io/tp3-gcp-497003/sobel-joiner:latest
          ports:
            - containerPort: 9001
              name: http
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq.sobel.svc.cluster.local"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: pass
            - name: REDIS_HOST
              value: "redis.sobel.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Service ClusterIP — necesario para que el ServiceMonitor scrapee /metrics
apiVersion: v1
kind: Service
metadata:
  name: joiner
  namespace: sobel
  labels:
    app: joiner
spec:
  selector:
    app: joiner
  ports:
    - name: http
      port: 9001
      targetPort: 9001
