apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sobel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        nodegroup: apps
      tolerations:
        - key: nodegroup
          value: apps
          effect: NoSchedule
      containers:
        - name: backend
          image: gcr.io/tp3-gcp-497003/sobel-backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq.sobel.svc.cluster.local"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: pass
            - name: REDIS_HOST
              value: "redis.sobel.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sobel
  labels:
    app: backend
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
