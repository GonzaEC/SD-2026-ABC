apiVersion: apps/v1
kind: Deployment
metadata:
  name: split
  namespace: sobel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: split
  template:
    metadata:
      labels:
        app: split
    spec:
      nodeSelector:
        nodegroup: apps
      tolerations:
        - key: nodegroup
          value: apps
          effect: NoSchedule
      initContainers:
        - name: wait-rabbitmq
          image: busybox
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo "Esperando RabbitMQ..."; sleep 3; done
      containers:
        - name: split
          image: gcr.io/mi-proyecto/sobel-split:latest
          ports:
            - containerPort: 9000
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: pass
            - name: WORKERS
              value: "3"
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: split
  namespace: sobel
spec:
  selector:
    app: split
  ports:
    - port: 9000
      targetPort: 9000
