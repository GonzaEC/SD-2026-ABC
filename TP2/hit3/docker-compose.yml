services:
  nodo1:
    build: .
    container_name: nodo1
    environment:
      - NODE_ID=1
      - PEERS=2,http://nodo2:8000;3,http://nodo3:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/nodo1:/app/logs
    networks:
      - red_docker
    ports:
      - "8001:8000"
    restart: on-failure

  nodo2:
    build: .
    container_name: nodo2
    environment:
      - NODE_ID=2
      - PEERS=1,http://nodo1:8000;3,http://nodo3:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/nodo2:/app/logs
    networks:
      - red_docker
    ports:
      - "8002:8000"
    restart: on-failure

  nodo3:
    build: .
    container_name: nodo3
    environment:
      - NODE_ID=3
      - PEERS=1,http://nodo1:8000;2,http://nodo2:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/nodo3:/app/logs
    networks:
      - red_docker
    ports:
      - "8003:8000"
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "7685:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nodo1
      - nodo2
      - nodo3
    networks:
      - red_docker
    restart: on-failure

networks:
  red_docker:
    name: red_docker
    driver: bridge