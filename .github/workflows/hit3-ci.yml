name: "Hit3 | CI — Tests + Seguridad"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Tests corren siempre, independientemente de gitleaks ─────────────────
  tests:
    name: Tests unitarios e integración
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: TP3/Hit3/tests/requirements-test.txt

      - name: Instalar dependencias de test
        run: pip install -r TP3/Hit3/tests/requirements-test.txt

      - name: Tests unitarios + integración con cobertura
        run: |
          pytest TP3/Hit3/tests/ \
            -v --tb=short \
            --cov=TP3/Hit3/services \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          LOG_DIR: /tmp/sobel-test-logs

  # ── Gitleaks — falla el pipeline si detecta un secret real hardcodeado ────
  gitleaks:
    name: Gitleaks — detección de secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Si gitleaks falla: revocar el secret inmediatamente.
        # El historial de Git lo conserva aunque se elimine del código.

  # ── Terraform validate — sin credenciales GCP ────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init (sin backend)
        working-directory: TP3/Hit3/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: TP3/Hit3/terraform
        run: terraform validate

      - name: Terraform Format check
        working-directory: TP3/Hit3/terraform
        run: terraform fmt -check -recursive
