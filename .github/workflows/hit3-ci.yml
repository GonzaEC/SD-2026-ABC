name: "Hit3 | CI — Tests + Seguridad"

# Pipeline de CI que corre en todo push y PR.
# Falla si: gitleaks detecta secrets hardcodeados, tests fallan o coverage < umbral.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Detección de secrets hardcodeados ─────────────────────────────────────
  gitleaks:
    name: Gitleaks — detección de secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historial completo para escanear todos los commits

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Si detecta un secret hardcodeado el job falla y bloquea el merge.
        # Revocar el secret inmediatamente si esto ocurre — el historial
        # de Git lo conserva aunque se elimine del código.

  # ── 2. Tests unitarios e integración ─────────────────────────────────────────
  tests:
    name: Tests unitarios e integración
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: TP3/Hit3/tests/requirements-test.txt

      - name: Instalar dependencias de test
        run: pip install -r TP3/Hit3/tests/requirements-test.txt

      - name: Tests unitarios — Sobel
        run: |
          pytest TP3/Hit3/tests/unit/test_sobel.py \
            -v --tb=short

      - name: Tests unitarios — Scaler
        run: |
          pytest TP3/Hit3/tests/unit/test_scaler.py \
            -v --tb=short

      - name: Tests unitarios — Joiner
        run: |
          pytest TP3/Hit3/tests/unit/test_joiner_logic.py \
            -v --tb=short

      - name: Tests unitarios — Worker
        run: |
          pytest TP3/Hit3/tests/unit/test_worker_logic.py \
            -v --tb=short

      - name: Tests de integración (mocks)
        run: |
          pytest TP3/Hit3/tests/integration/ \
            -v --tb=short

      - name: Reporte de cobertura
        run: |
          pytest TP3/Hit3/tests/ \
            --cov=TP3/Hit3/services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── 3. Validar Terraform ──────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init (solo validación sintáctica)
        working-directory: TP3/Hit3/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: TP3/Hit3/terraform
        run: terraform validate

      - name: Terraform Format check
        working-directory: TP3/Hit3/terraform
        run: terraform fmt -check -recursive
