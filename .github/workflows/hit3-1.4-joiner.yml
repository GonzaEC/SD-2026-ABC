name: "Hit3 | Pipeline 1.4 — Joiner"

on:
  push:
    branches: [main]
    paths:
      - "TP3/Hit3/services/joiner/**"
      - "TP3/Hit3/k8s/joiner.yaml"
  workflow_dispatch:

env:
  GKE_CLUSTER: sobel-cluster
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  NAMESPACE: sobel
  IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/sobel-joiner

jobs:
  preflight:
    name: Verificar credenciales GCP
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$SA_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GCP_SA_KEY no configurado - se omite el deploy (no es un error)."
          fi

  build-and-deploy:
    name: Build, Push & Deploy Joiner
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & Push
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            TP3/Hit3/services/joiner/
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Obtener credenciales GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_ZONE }}

      - name: Deploy
        run: kubectl apply -f TP3/Hit3/k8s/joiner.yaml -n ${{ env.NAMESPACE }}

      - name: Actualizar imagen con SHA del commit
        run: |
          kubectl set image deployment/joiner \
            joiner=${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/joiner \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s
