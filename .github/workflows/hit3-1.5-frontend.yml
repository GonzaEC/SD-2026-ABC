name: "Hit3 | Pipeline 1.5 — Frontend"

on:
  push:
    branches: [main]
    paths:
      - "TP3/Hit3/k8s/frontend.yaml"
  workflow_dispatch:

env:
  GKE_CLUSTER: sobel-cluster
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  NAMESPACE: sobel

jobs:
  preflight:
    name: Verificar credenciales GCP
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$SA_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GCP_SA_KEY no configurado - se omite el deploy (no es un error)."
          fi

  deploy-frontend:
    name: Deploy Frontend (nginx)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Obtener credenciales GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_ZONE }}

      - name: Deploy
        run: kubectl apply -f TP3/Hit3/k8s/frontend.yaml -n ${{ env.NAMESPACE }}

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=60s
