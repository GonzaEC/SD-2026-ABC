name: "Hit3 | Pipeline 1.2 — Backend"

on:
  push:
    branches: [main]
    paths:
      - "TP3/Hit3/services/backend/**"
      - "TP3/Hit3/k8s/backend.yaml"
  workflow_dispatch:

env:
  GKE_CLUSTER: sobel-cluster
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  NAMESPACE: sobel
  IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/sobel-backend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_SA_KEY != '' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & Push
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            TP3/Hit3/services/backend/
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Obtener credenciales GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_ZONE }}

      - name: Deploy
        run: kubectl apply -f TP3/Hit3/k8s/backend.yaml -n ${{ env.NAMESPACE }}

      - name: Actualizar imagen con SHA del commit
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s
